<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="8" />
    <title>ZenTokuJi Board</title>
    <style>
      :root {
        --paper: #f2e5cf;
        --ink: #211811;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        color: var(--ink);
        font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.32), transparent 35%),
          linear-gradient(180deg, #f5ecdf 0%, #e8dac1 58%, #d8c4a0 100%);
      }

      .card {
        width: min(1100px, 100%);
        min-height: min(82vh, 900px);
        display: grid;
        place-items: center;
        gap: 1rem;
        padding: clamp(1.5rem, 4vw, 3rem);
        border-radius: 32px;
        background: rgba(255, 249, 239, 0.78);
        box-shadow: 0 24px 60px rgba(36, 20, 14, 0.18);
        text-align: center;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .value {
        font-family: "Hiragino Mincho ProN", "Yu Mincho", "BIZ UDPMincho", serif;
        font-weight: 700;
        line-height: 0.92;
      }

      .value.number {
        font-size: clamp(6rem, 28vw, 18rem);
      }

      .value.message {
        font-size: clamp(2.6rem, 8vw, 5.8rem);
        line-height: 1.15;
      }

      .caption {
        color: rgba(33, 24, 17, 0.68);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .meta {
        color: rgba(33, 24, 17, 0.68);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">ZEN TOKU JI</p>
      <div class="value number">011</div>
      <div class="caption">現在の受付番号</div>
      <div class="meta">updated: 2026-03-21T09:48:24Z</div>
    </main>
  </body>
</html>
