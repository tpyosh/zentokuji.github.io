<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="8" />
    <title>ZenTokuJi Board</title>
    <style>
      :root {
        --page: #f3f1ec;
        --surface: #ffffff;
        --surface-muted: #f7f5f1;
        --ink: #222222;
        --muted: #666666;
        --line: #d7d2c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        color: var(--ink);
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background: var(--page);
      }

      .card {
        width: min(1100px, 100%);
        min-height: min(82vh, 900px);
        display: grid;
        place-items: center;
        gap: 1rem;
        padding: clamp(1.5rem, 4vw, 3rem);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        text-align: center;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .value {
        font-family: "Hiragino Mincho ProN", "Yu Mincho", "BIZ UDPMincho", serif;
        font-weight: 700;
        line-height: 0.92;
      }

      .value.number {
        font-size: clamp(6rem, 28vw, 18rem);
      }

      .value.message {
        font-size: clamp(2.6rem, 8vw, 5.8rem);
        line-height: 1.15;
      }

      .caption {
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .notice {
        max-width: 36rem;
        color: var(--muted);
        font-size: clamp(0.95rem, 1.5vw, 1.15rem);
        line-height: 1.6;
      }

      .meta {
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">ZEN TOKU JI</p>
      <div class="value number">075</div>
      <div class="caption">現在供養中の番号</div>
      <div class="notice">受付番号076 ~ 080の方は本堂へお集まりください</div>
      <div class="meta">updated: 2026-03-24T23:09:05Z</div>
    </main>
  </body>
</html>
